name: anti_theft_app
description: "Anti Theft App using Flutter and Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  url_launcher: ^6.3.2
  
  # --- GPS & Maps ---
  # Note: 14.0.2 is the latest for 2026, ensure Android compileSDK is 34+
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.2
  latlong2: ^0.9.1  # Highly recommended for easy distance math!

  # --- Firebase (Latest Stable 2026) ---
  firebase_core: ^4.4.0
  firebase_database: ^12.1.3
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0
  
  # --- New Features ---
  flutter_background_service: ^5.0.5
  permission_handler: ^11.3.1
  audioplayers: ^6.6.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/alarm.ogg